name: Bug report
description: Report reproducible unexpected behavior.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Do not include passwords, API keys, cookies, private user data, or other secrets."
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the actual behavior and its impact.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable sequence of steps.
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Frontend UI
        - Authentication
        - NoCodeBackend data proxy
        - Validation or tests
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include browser/OS, app version or commit, and relevant non-sensitive configuration.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Redact secrets and personal data before attaching evidence.
