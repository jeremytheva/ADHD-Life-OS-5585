name: Implementation work
description: Propose a scoped feature, enhancement, or implementation task.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Thanks for proposing work. Please describe the user outcome and a small, reviewable scope."
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user or maintainer problem does this solve?
      placeholder: As a ..., I need ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposed-change
    attributes:
      label: Proposed change
      description: Describe the expected behavior and acceptance criteria.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and non-goals
      description: List affected areas and explicitly state what this issue will not do.
      placeholder: "In scope: ...\nOut of scope: ..."
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Which tests, manual checks, accessibility checks, or documentation updates are needed?
    validations:
      required: true
  - type: checkboxes
    id: security
    attributes:
      label: Security and data handling
      options:
        - label: This proposal does not require browser access to secrets or bypass the NoCodeBackend proxy boundary.
          required: true
